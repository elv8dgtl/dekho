name: Update Sitemap

on:
  # Runs automatically every day at midnight UTC
  schedule:
    - cron: '0 0 * * *'
  # Allows you to click a button in GitHub to run it manually anytime
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run Sitemap Script
        run: node generate-sitemap.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add article-sitemap.xml
          # Only commit if the sitemap actually changed
          git commit -m "chore: auto-update article-sitemap.xml" || echo "No changes to commit"
          git push
